<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dolce Vita</title>
  <meta property="og:title" content="Dolce Vita">
  <meta property="og:description" content="Out now.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://dolcevitamovie.com">
  <meta property="og:image" content="https://dolcevitamovie.com/og-image.png">
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    @font-face {
      font-family: 'SF Pro Display';
      src: url('fonts/SF-Pro-Display-Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #000;
      padding: 20px;
    }
    .spacer {
      flex: 1 1 0;
      width: 100%;
    }
    .spacer-bottom {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .video-wrap {
      flex: 0 0 auto;
      width: 100%;
      max-width: 900px;
      aspect-ratio: 16 / 9;
      border-radius: 6px;
      overflow: hidden;
    }
    .video-wrap iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
    #caption {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 12px;
      font-weight: 400;
      text-align: center;
      line-height: 1.5;
    }
    #caption .title {
      color: #000;
    }
    #caption .credit {
      color: rgba(0, 0, 0, 0.45);
    }
  </style>
</head>
<body>
  <div class="spacer"></div>
  <div class="video-wrap">
    <iframe
      src="https://www.youtube-nocookie.com/embed/43bMlGA2m-Q?rel=0"
      title="Dolce Vita"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      allowfullscreen></iframe>
  </div>
  <div class="spacer spacer-bottom">
    <p id="caption"><span class="title">Dolce Vita, 2026, Full Movie (4K)</span><br><span class="credit">A Film by Rohan Kadakia, Rights Reserved</span></p>
  </div>
</body>
</html>
